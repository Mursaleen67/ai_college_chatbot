<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Answer</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body{
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to bottom right,
rgba(212,20,190,0.6),
rgba(50,100,255,0.6),
rgba(0,200,255,0.6));
}
.container{
    width:600px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}
textarea{
    width: 100%;
    height: 120px;
    padding: 10px;
    margin-top: 10px;
}
button{
    margin-top: 10px;
    padding: 12px;
   background: linear-gradient(to bottom right,
rgba(212,20,190,0.6),
rgba(50,100,255,0.6),
rgba(0,200,255,0.6));
color: rgb(27, 27, 100);
border-radius:  4px;
border: none;
width: 100%;
cursor: pointer;
}
    </style>
</head>
<body>
    <div class="container">
        <h2>Your Question</h2>
        <p>
            {{ question }}
        </p>
        <h2>Answer</h2>
        <p>
            {{ answer }}
        </p>
        <a href="/">Ask Another Question</a>
    </div>
</body>
</html>
